<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Play Quiz</title>
<style>
  body { font-family: Arial; background:#1a1a2e; color:white; padding:15px; }
  .q-btn { display:block; width:100%; margin:10px 0; padding:15px; font-size:18px; border:none; border-radius:8px; background:#0f3460; color:white; cursor:pointer; }
  .locked { background:#444; opacity:0.6; cursor:not-allowed; }
  .quiz-box { background:#16213e; padding:20px; border-radius:15px; display:none; }
  .option { display:block; width:100%; margin:8px 0; padding:12px; border:none; border-radius:8px; background:#0f3460; color:white; font-size:16px; cursor:pointer; }
  .timer { color:orange; font-weight:bold; text-align:center; }
  #errorBox { color:#ff6b6b; text-align:center; padding:20px; font-size:16px; display:none; }
</style>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
          <script>
            window.TelegramAdsController = new TelegramAdsController();
            window.TelegramAdsController.initialize({
              pubId: "1013423",
              appId: "7627",
            });
          </script> 
</head>
<body>

<h2>🧠 Quiz Zone <span style="float:right">💰 <span id="coins">0</span></span></h2>
<div id="lockMsg" class="timer"></div>
<div id="errorBox"></div>
<div id="questionList"><h3 style="text-align:center">Loading...</h3></div>

<div id="quizBox" class="quiz-box">
  <h3 id="qText"></h3>
  <div id="options"></div>
</div>

<button onclick="location.href='index.html'" style="margin-top:20px; padding:10px; width:100%;">⬅️ Back</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALgsT0Hma3XzOra4egA0hHU9HEToRSg",
    authDomain: "quiz-master-bddda.firebaseapp.com",
    databaseURL: "https://quiz-master-bddda-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "quiz-master-bddda",
    storageBucket: "quiz-master-bddda.firebasestorage.app",
    messagingSenderId: "839923899515",
    appId: "1:839923899515:web:3bfd68db70359fd5cb16de",
    measurementId: "G-5J1WDZ1P0S"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  
  let userRef = null;
  let userCoins = 0;
  let currentQ = null;

  const questions = [
    {id:1, q:"India ki Rajdhani?", options:["Mumbai","Delhi","Kolkata","Chennai"], ans:1},
    {id:2, q:"2+2=?", options:["3","4","5","6"], ans:1},
    {id:3, q:"Sun rises from", options:["West","East","North","South"], ans:1},
    {id:4, q:"Taj Mahal kaha hai?", options:["Delhi","Agra","Jaipur","Mumbai"], ans:1},
    {id:5, q:"PM of India 2024?", options:["Rahul","Modi","Kejriwal","Yogi"], ans:1},
    {id:6, q:"Largest Planet?", options:["Earth","Mars","Jupiter","Venus"], ans:2},
    {id:7, q:"Water formula?", options:["H2O","O2","CO2","NaCl"], ans:0},
    {id:8, q:"National Animal?", options:["Lion","Tiger","Elephant","Peacock"], ans:1}
  ];

  function saveData(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
  function loadData(key) { return JSON.parse(localStorage.getItem(key)) || null; }

  function showError(msg) {
    document.getElementById('errorBox').innerText = msg;
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('questionList').innerHTML = '';
  }

  function checkGlobalLock() {
    let lockTill = loadData('global_lock');
    if (lockTill && Date.now() < lockTill) {
      let sec = Math.ceil((lockTill - Date.now())/1000);
      document.getElementById('lockMsg').innerText = `⏳ Wait ${sec}s for next question`;
      return true;
    }
    document.getElementById('lockMsg').innerText = '';
    return false;
  }

  function showQuestions() {
    let html = '';
    let qLocks = loadData('question_locks') || {};
    
    questions.forEach(q => {
      let unlockTime = qLocks[q.id];
      let isLocked = unlockTime && unlockTime > Date.now();
      let timeLeft = isLocked ? Math.ceil((unlockTime - Date.now())/1000/3600) : 0;
      
      if (isLocked) {
        html += `<button class="q-btn locked">🔒 Locked ${timeLeft}h left</button>`;
      } else {
        html += `<button class="q-btn" onclick="openQuiz(${q.id})">Q${q.id} - Play & Win 10 Coins</button>`;
      }
    });
    document.getElementById('questionList').innerHTML = html;
  }

  window.openQuiz = function(qid) {
    if (checkGlobalLock()) return;
    if (typeof show_11059500 === 'undefined') {
      tg.showAlert('Ad load nahi ho raha. Page refresh karo.');
      return;
    }
    
    document.getElementById('questionList').innerHTML = '<h3 style="text-align:center;color:#4CAF50;">Loading Ad...</h3>';
    
    show_11059500().then(() => {
      currentQ = questions.find(x => x.id === qid);
      document.getElementById('questionList').style.display = 'none';
      document.getElementById('quizBox').style.display = 'block';
      document.getElementById('qText').innerText = currentQ.q;
      
      let optHtml = '';
      currentQ.options.forEach((o, i) => {
        optHtml += `<button class="option" onclick="checkAns(${i})">${o}</button>`;
      });
      document.getElementById('options').innerHTML = optHtml;
    }).catch(() => {
      tg.showAlert('Quiz unlock karne ke liye ad dekhna zaroori hai!');
      showQuestions();
    });
  }

  window.checkAns = async function(selected) {
    try {
      userCoins += 10;
      await updateDoc(userRef, { coins: userCoins });
      document.getElementById('coins').innerText = userCoins;

      if (selected === currentQ.ans) {
        tg.showAlert('✅ Sahi Jawab! +10 Coins Mile');
      } else {
        tg.showAlert('❌ Galat Jawab! Phir bhi +10 Coins Mile');
      }

      saveData('global_lock', Date.now() + 5*60*1000);
      let qLocks = loadData('question_locks') || {};
      qLocks[currentQ.id] = Date.now() + 22*60*60*1000;
      saveData('question_locks', qLocks);
      
      document.getElementById('quizBox').style.display = 'none';
      document.getElementById('questionList').style.display = 'block';
      showQuestions();
    } catch (err) {
      tg.showAlert('Error: Please try again');
    }
  }

  async function init() {
    const user = tg.initDataUnsafe?.user;
    if (!user) {
      showError('Please open this app from Telegram');
      return;
    }
    
    try {
      userRef = doc(db, "users", user.id.toString());
      const userSnap = await getDoc(userRef);
      
      if (!userSnap.exists()) {
        showError('Please start from Home Page first');
        return;
      }
      
      userCoins = userSnap.data().coins || 0;
      document.getElementById('coins').innerText = userCoins;
      showQuestions();
      
    } catch (err) {
      showError('Something went wrong. Please restart the app');
    }
  }

  setInterval(checkGlobalLock, 1000);
  init();

</script>
</body>
</html>

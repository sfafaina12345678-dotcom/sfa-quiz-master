<!DOCTYPE html>
<html>
<head>
    
    <title>SFA Quiz Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; background:#1a1a2e; color:white; text-align:center; padding:20px; }
        .btn { display:block; width:80%; margin:20px auto; padding:20px; font-size:24px; 
               border:none; border-radius:15px; cursor:pointer; font-weight:bold; }
        .play { background:#e94560; color:white; }
        .redeem { background:#28a745; color:white; }
        .coins { font-size:20px; margin:20px; }
    </style>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
          <script>
            window.TelegramAdsController = new TelegramAdsController();
            window.TelegramAdsController.initialize({
              pubId: "1013423",
              appId: "7627",
            });
          </script>
</head>
<body>
    <h1>🎯 SFA Quiz Master</h1>
    <div class="coins">💰 Your Coins: <span id="coinCount">0</span></div>
    
    <button class="btn play" onclick="location.href='play.html'">🎮 PLAY</button>
    <button class="btn redeem" onclick="location.href='redeem.html'">💰 REDEEM</button>
    <script type="module">
  // 1. Firebase + Firestore Import
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  // 2. Tera Config
  const firebaseConfig = {
    apiKey: "AIzaSyALgsT0Hma3XzOra4egA0hHU9HEToRSg",
    authDomain: "quiz-master-bddda.firebaseapp.com",
    databaseURL: "https://quiz-master-bddda-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "quiz-master-bddda",
    storageBucket: "quiz-master-bddda.firebasestorage.app",
    messagingSenderId: "839923899515",
    appId: "1:839923899515:web:3bfd68db70359fd5cb16de",
    measurementId: "G-5J1WDZ1P0S"
  };

  // 3. Initialize
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  // 4. Telegram
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // 5. User Save + Coins Logic
  async function main() {
    const user = tg.initDataUnsafe?.user;
    
    if (!user) {
      document.body.innerHTML = "<h1>Please open in Telegram</h1>";
      return;
    }

    const userId = user.id.toString();
    const userRef = doc(db, "users", userId);

    try {
      const userSnap = await getDoc(userRef);
      
      if (!userSnap.exists()) {
        await setDoc(userRef, {
          telegram_id: user.id,
          first_name: user.first_name,
          username: user.username || null,
          coins: 100,
          created_at: new Date()
        });
        document.getElementById('coinCount').innerText = 100;
      } else {
        document.getElementById('coinCount').innerText = userSnap.data().coins;
      }
      
      document.querySelector('h1').innerText = `🧠 SFA Quiz Master - Hi ${user.first_name}!`;

    } catch (error) {
      console.error("Firebase Error: ", error);
      document.body.innerHTML = "<h1>Error: Check Firestore Rules</h1>";
    }
  }

  main();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <!-- Monetag SDK -->
<script src='//libtl.com/sdk.js' data-zone='11059500' data-sdk='show_11059500'></script>
    <title>SFA Quiz Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; background:#1a1a2e; color:white; text-align:center; padding:20px; }
        .btn { display:block; width:80%; margin:20px auto; padding:20px; font-size:24px; 
               border:none; border-radius:15px; cursor:pointer; font-weight:bold; }
        .play { background:#e94560; color:white; }
        .redeem { background:#28a745; color:white; }
        .coins { font-size:20px; margin:20px; }
    </style>
</head>
<body>
    <h1>🎯 SFA Quiz Master</h1>
    <div class="coins">💰 Your Coins: <span id="coinCount">0</span></div>
    
    <button class="btn play" onclick="location.href='play.html'">🎮 PLAY</button>
    <button class="btn redeem" onclick="location.href='redeem.html'">💰 REDEEM</button>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    // Coins load karo
    let coins = parseInt(localStorage.getItem('sfa_coins') || 0);
    document.getElementById('coinCount').innerText = coins;
</script>
</body>
</html>

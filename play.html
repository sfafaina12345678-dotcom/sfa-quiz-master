<!DOCTYPE html>
<html>
<head>
    <title>Play Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; background:#1a1a2e; color:white; padding:15px; }
        .q-btn { display:block; width:100%; margin:10px 0; padding:15px; font-size:18px; 
                 border:none; border-radius:10px; background:#0f3460; color:white; }
        .locked { background:#444; opacity:0.6; }
        .quiz-box { background:#16213e; padding:20px; border-radius:15px; display:none; }
        .option { display:block; width:100%; margin:8px 0; padding:12px; border:none; 
                  border-radius:8px; background:#0f3460; color:white; font-size:16px; }
        .timer { color:#e94560; font-weight:bold; }
    </style>
</head>
<body>
    <h2>🎮 Quiz Zone <span style="float:right">💰 <span id="coins">0</span></span></h2>
    <div id="lockMsg" class="timer"></div>
    
    <div id="questionList"></div>
    
    <div id="quizBox" class="quiz-box">
        <h3 id="qText"></h3>
        <div id="options"></div>
    </div>
    
    <button onclick="location.href='index.html'" style="margin-top:20px; padding:10px;">⬅️ Back</button>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let coins = parseInt(localStorage.getItem('sfa_coins') || 0);
document.getElementById('coins').innerText = coins;

// 8 Questions
const questions = [
    {id:1, q:"India ki Rajdhani?", opt:["Mumbai","Delhi","Kolkata","Chennai"], ans:1},
    {id:2, q:"2+2=?", opt:["3","4","5","6"], ans:1},
    {id:3, q:"Sun rises from?", opt:["West","East","North","South"], ans:1},
    {id:4, q:"Taj Mahal kaha hai?", opt:["Delhi","Agra","Jaipur","Mumbai"], ans:1},
    {id:5, q:"PM of India 2024?", opt:["Rahul","Modi","Kejriwal","Yogi"], ans:1},
    {id:6, q:"Largest Planet?", opt:["Earth","Mars","Jupiter","Venus"], ans:2},
    {id:7, q:"Water formula?", opt:["H2O","CO2","O2","N2"], ans:0},
    {id:8, q:"National Animal?", opt:["Lion","Tiger","Elephant","Peacock"], ans:1}
];

function saveData(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function loadData(key) { return JSON.parse(localStorage.getItem(key) || 'null'); }

// Check 5 min global lock
function checkGlobalLock() {
    let lockTill = loadData('global_lock');
    if (lockTill && Date.now() < lockTill) {
        let sec = Math.ceil((lockTill - Date.now())/1000);
        document.getElementById('lockMsg').innerText = `⏳ Wait ${sec}s for next question`;
        return true;
    }
    document.getElementById('lockMsg').innerText = '';
    return false;
}

// Show 8 question buttons
function showQuestions() {
    let html = '';
    let qLocks = loadData('question_locks') || {};
    
    questions.forEach(q => {
        let unlockTime = qLocks[q.id];
        let isLocked = unlockTime && Date.now() < unlockTime;
        let timeLeft = isLocked ? Math.ceil((unlockTime - Date.now())/1000/3600) : 0;
        
        if (isLocked) {
            html += `<button class="q-btn locked">Q${q.id} 🔒 Locked ${timeLeft}h left</button>`;
        } else {
            html += `<button class="q-btn" onclick="startAd(${q.id})">Q${q.id} ▶️ Watch Ad & Play</button>`;
        }
    });
    document.getElementById('questionList').innerHTML = html;
}

// Ad dekhne ke baad quiz khule
function startAd(qid) {
    if (checkGlobalLock()) return;
    
    alert('🎬 Ad Dekho Abhi! Monetag ka ad yaha lagega');
    // Yaha Monetag ka code aayega: show_xxx().then(() => openQuiz(qid))
    
    // Abhi ke liye direct khol rahe
    openQuiz(qid);
}

let currentQ = null;
function openQuiz(qid) {
    currentQ = questions.find(x => x.id === qid);
    document.getElementById('questionList').style.display = 'none';
    document.getElementById('quizBox').style.display = 'block';
    document.getElementById('qText').innerText = currentQ.q;
    
    let optHtml = '';
    currentQ.opt.forEach((o,i) => {
        optHtml += `<button class="option" onclick="checkAns(${i})">${o}</button>`;
    });
    document.getElementById('options').innerHTML = optHtml;
}

function checkAns(selected) {
    // Sahi ya galat - dono me +10 coins
    coins += 10;
    localStorage.setItem('sfa_coins', coins);
    document.getElementById('coins').innerText = coins;
    
    if (selected === currentQ.ans) {
        alert('✅ Sahi Jawab! +10 Coins Mile');
    } else {
        alert('❌ Galat Jawab! Phir bhi +10 Coins Mile');
    }
    
    // 1. 5 min ka global lock laga do
    saveData('global_lock', Date.now() + 5*60*1000);
    
    // 2. Is question ko 22 ghante ke liye lock kar do
    let qLocks = loadData('question_locks') || {};
    qLocks[currentQ.id] = Date.now() + 22*60*60*1000;
    saveData('question_locks', qLocks);
    
    // Wapas question list pe
    document.getElementById('quizBox').style.display = 'none';
    document.getElementById('questionList').style.display = 'block';
    showQuestions();
}

setInterval(checkGlobalLock, 1000);
showQuestions();
</script>
</body>
</html>

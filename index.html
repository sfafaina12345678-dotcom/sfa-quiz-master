<!DOCTYPE html>
<html>
<head>
    <!-- Monetag SDK -->
<script src='//libtl.com/sdk.js' data-zone='11059500' data-sdk='show_11059500'></script>
    <title>SFA Quiz Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; background:#1a1a2e; color:white; text-align:center; padding:20px; }
        .btn { display:block; width:80%; margin:20px auto; padding:20px; font-size:24px; 
               border:none; border-radius:15px; cursor:pointer; font-weight:bold; }
        .play { background:#e94560; color:white; }
        .redeem { background:#28a745; color:white; }
        .coins { font-size:20px; margin:20px; }
    </style>
</head>
<body>
    <h1>🎯 SFA Quiz Master</h1>
    <div class="coins">💰 Your Coins: <span id="coinCount">0</span></div>
    
    <button class="btn play" onclick="location.href='play.html'">🎮 PLAY</button>
    <button class="btn redeem" onclick="location.href='redeem.html'">💰 REDEEM</button>
    <script type="module">
  // 1. Firebase import karo
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'
  import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js'

  // 2. YAHAN TERA firebaseConfig PASTE KAR - Project Settings se copy karke
  const firebaseConfig = {
    apiKey: "AIza...",
    authDomain: "sfa-quiz-master.firebaseapp.com",
    projectId: "sfa-quiz-master",
    storageBucket: "sfa-quiz-master.appspot.com",
    messagingSenderId: "123456",
    appId: "1:123456:web:abcdef"
  };

  // 3. Firebase start karo
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 4. Telegram + Firebase ka asli code
  async function loadUser() {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    const user = tg.initDataUnsafe?.user;
    
    if (!user) {
      document.getElementById('coinCount').innerText = "Open in Telegram";
      return;
    }
    
    const userId = user.id.toString(); 
    const userRef = doc(db, "users", userId);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      // Naya user - Firestore me bana do
      await setDoc(userRef, {
        telegramId: userId,
        firstName: user.first_name,
        username: user.username || null,
        coins: 100,
        createdAt: new Date()
      });
      document.getElementById('coinCount').innerText = 100;
    } else {
      // Purana user - coins dikha do
      const data = userSnap.data();
      document.getElementById('coinCount').innerText = data.coins;
    }
  }

  loadUser();
    </script>
</body>
</html>

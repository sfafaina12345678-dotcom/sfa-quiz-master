<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Redeem Coins</title>
<style>
  body { font-family: Arial; background:#1a1a2e; color:white; text-align:center; padding:20px; }
  .box { background:#16213e; padding:20px; border-radius:15px; margin:20px 0; }
  .btn { padding:15px 30px; font-size:20px; border:none; border-radius:10px; 
         background:#28a745; color:white; cursor:pointer; margin:10px; }
  .btn:disabled { background:#444; opacity:0.6; cursor:not-allowed; }
  .back { background:#6c757d; }
  #errorBox { color:red; text-align:center; padding:10px; font-size:16px; }
</style>
</head>
<body>
  <h1>🎁 Redeem Coins</h1>
  <div id="errorBox"></div>

  <div class="box">
    <h2>Your Wallet</h2>
    <div style="font-size:40px;">💰 <span id="coinCount">0</span></div>
    <p style="margin-top:20px; font-size:18px;">5000 Coins = ₹10 Redeem Code</p>
  </div>

  <button class="btn" id="redeemBtn" onclick="redeemCoins()" disabled>Redeem 5000 Coins</button>
  <button class="btn back" onclick="location.href='index.html'">⬅️ Back</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALgsT0Hma3XzOra4egA0hHU9HEToRSg",
    authDomain: "quiz-master-bddda.firebaseapp.com",
    databaseURL: "https://quiz-master-bddda-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "quiz-master-bddda",
    storageBucket: "quiz-master-bddda.firebasestorage.app",
    messagingSenderId: "839923899515",
    appId: "1:839923899515:web:3bfd68db70359fd5cb16de",
    measurementId: "G-5J1WDZ1P0S"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  
  let userRef = null;
  let coins = 0;

  async function init() {
    const user = tg.initDataUnsafe?.user;
    if (!user) {
      document.getElementById('errorBox').innerHTML = "❌ Bot se open karo.";
      return;
    }
    
    try {
      userRef = doc(db, "users", user.id.toString());
      const userSnap = await getDoc(userRef);
      
      if (!userSnap.exists()) {
        document.getElementById('errorBox').innerHTML = "❌ User nahi mila.<br>Pehle Home Page kholo.";
        return;
      }
      
      coins = userSnap.data().coins || 0;
      document.getElementById('coinCount').innerText = coins;
      
      // Button enable/disable
      if (coins >= 5000) {
        document.getElementById('redeemBtn').disabled = false;
      }
      
    } catch (err) {
      document.getElementById('errorBox').innerHTML = 'Firebase Error: ' + err.message;
    }
  }

  window.redeemCoins = async function() {
    if (coins < 5000) {
      alert('❌ Minimum 5000 coins chahiye!\nAbhi: ' + coins + ' coins');
      return;
    }
    
    try {
      coins -= 5000;
      await updateDoc(userRef, { coins: coins });
      document.getElementById('coinCount').innerText = coins;
      
      if (coins < 5000) {
        document.getElementById('redeemBtn').disabled = true;
      }
      
      alert('✅ Redeem Request Sent!\n24 ghante me code milega.');
      tg.sendData('REDEEM:5000'); // Bot ko data bhej dega
      
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  init();
</script>
</body>
</html>
